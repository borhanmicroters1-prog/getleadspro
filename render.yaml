services:
  - type: web
    name: getclient-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_PROJECT_ID
        value: "grdqjnazfdznbviopmxf"
      - key: SUPER_ADMIN_EMAIL
        value: "borhan.seoexpert@gmail.com"
      - key: FRONTEND_URL
        value: "https://getleadspro.vercel.app"
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
      - key: SSLCOMMERZ_IS_SANDBOX
        value: "True"

